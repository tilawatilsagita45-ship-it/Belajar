<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        utama: '#3B66C2', // Warna biru sesuai sketsa
                    },
                    borderRadius: {
                        'xl': '1.5rem',
                        '2xl': '2rem',
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .border-kustom {
                border: 1.5px solid #3B66C2;
            }
            .garis-putus {
                background-image: linear-gradient(to right, #3B66C2 50%, transparent 50%);
                background-size: 8px 1px;
                background-repeat: repeat-x;
            }
        }
    </style>
</head>
<body class="bg-white min-h-screen flex items-center justify-center p-4 md:p-8">
    <div class="relative w-full max-w-6xl min-h-[80vh]">
        <!-- Bagian Foto -->
        <div class="absolute top-0 left-0 w-[350px] md:w-[420px]">
            <!-- Kotak Atas Foto -->
            <div class="bg-white border-kustom rounded-2xl p-8 h-[220px] flex items-center justify-center relative">
                <span class="text-utama text-xl font-medium">BERISI FOTO</span>
                <!-- Lingkaran di sudut kanan atas -->
                <div class="absolute top-4 right-4 w-10 h-10 border-2 border-utama rounded-full flex items-center justify-center">
                    <div class="w-6 h-6 border-2 border-utama rounded-full border-t-transparent"></div>
                </div>
            </div>
            <!-- Kotak Bawah Biru -->
            <div class="bg-utama rounded-2xl h-[280px] mt-1 relative">
                <!-- Garis dan Titik Tengah -->
                <div class="absolute top-1/2 left-0 right-0 flex items-center px-6">
                    <div class="garis-putus w-full h-px"></div>
                    <div class="w-3 h-3 bg-white rounded-full absolute right-16"></div>
                </div>
            </div>
        </div>

        <!-- Bagian Tentang Saya -->
        <div class="absolute top-10 right-0 w-[380px] md:w-[450px]">
            <!-- Lapisan Luar -->
            <div class="bg-white border-kustom rounded-2xl h-[280px] absolute -top-4 -left-4 w-full z-0"></div>
            <!-- Lapisan Dalam Biru -->
            <div class="bg-utama rounded-2xl h-[280px] flex items-center justify-center relative z-10">
                <span class="text-white text-xl font-medium">BERISI TENTANG SAYA</span>
            </div>
        </div>

        <!-- Bagian Kontak -->
        <div class="absolute bottom-10 right-[10%] w-[380px] md:w-[450px]">
            <!-- Lapisan Luar Biru -->
            <div class="bg-utama rounded-2xl h-[180px] absolute -bottom-4 -right-4 w-full z-0"></div>
            <!-- Lapisan Dalam Putih -->
            <div class="bg-white border-kustom rounded-2xl h-[180px] flex items-center justify-center relative z-10">
                <span class="text-utama text-xl font-medium">BERISI KONTAK</span>
            </div>
        </div>
    </div>
</body>
</html>
